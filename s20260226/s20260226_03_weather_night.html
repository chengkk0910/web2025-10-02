<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
        integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="container mt-3">
        <h2>天氣預報36小時</h2>
        <p>../pwd/pwd.js .gitignore let pwd = 'XXXXXX' 修改自己的授權碼</p>




        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>NAME</th>
                    <th>時段一&nbsp;&nbsp;&nbsp;<span id="time1"></span></th>
                    <th>時段二&nbsp;&nbsp;&nbsp;<span id="time2"></span></th>
                    <th>時段三&nbsp;&nbsp;&nbsp;<span id="time3"></span></th>

                </tr>
            </thead>
            <tbody id="myTbody">
                <!-- <tr>
                    <td>1</td>
                    <td>新北市</td>
                    <td>20-25 °C <img src="./data/day/1.svg" alt=""> </td>
                    <td>20-25 °C </td>
                    <td>20-25 °C </td>
                </tr> -->
            </tbody>
        </table>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
        integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="../pwd/pwd.js"></script>

    <script>
        $(document).ready(function () {

            // 1.bind
            const myTbody = $('#myTbody');
            const time1 = $('#time1');
            const time2 = $('#time2');
            const time3 = $('#time3');





            // 2.action

            console.log('pwd', pwd);

            let url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${pwd}`;
            // let url = `./data/data.json`;
            $.ajax({
                type: "get",
                url: url,
                // data: "data",
                dataType: "json",
                success: function (res) {
                    console.log('res', res);
                    let data = res.records.location;
                    let time1Start = data[0].weatherElement[0].time[0].startTime;
                    let time1End = data[0].weatherElement[0].time[0].endTime;
                    let time2Start = data[0].weatherElement[0].time[1].startTime;
                    let time2End = data[0].weatherElement[0].time[1].endTime;
                    let time3Start = data[0].weatherElement[0].time[2].startTime;
                    let time3End = data[0].weatherElement[0].time[2].endTime;


                    // 抓time1 2 3 start hour
                    // 用js date 方式抓hour
                    let time1Date = new Date(time1Start);
                    let time1StartHour = time1Date.getHours();
                    let timt1EndHour = new Date(time1End).getHours();

                    let time2Date = new Date(time2Start);
                    let time2StartHour = time2Date.getHours();
                    let time2EndHour = new Date(time2End).getHours();

                    let time3Date = new Date(time3Start);
                    let time3StartHour = time3Date.getHours();
                    let time3EndHour = new Date(time3End).getHours();


                    // let time1StartHour = time1Start.slice(11, 13);
                    // let timt1EndHour = time1End.slice(11, 13);
                    // let time2StartHour = time2Start.slice(11, 13);
                    // let time2EndHour = time2End.slice(11, 13);
                    // let time3StartHour = time3Start.slice(11, 13);
                    // let time3EndHour = time3End.slice(11, 13);


                    let time1String = `${time1StartHour} ~ ${timt1EndHour}`;
                    let time2String = `${time2StartHour} ~ ${time2EndHour}`;
                    let time3String = `${time3StartHour} ~ ${time3EndHour}`;



                    console.log('time1', time1);


                    time1.text(time1String);
                    time2.text(time2String);
                    time3.text(time3String);


                    // console.log('data', data);

                    // foreach loop

                    // let tmpText = ``;
                    let tmpText = '';
                    $.each(data, function (key, value) {

                        console.log('key', key);
                        console.log('value', value.locationName);
                        // weatherElement[0] WX 圖片 晴時多雲
                        // weatherElement[2] minT
                        // weatherElement[4] maxT
                        // time[0] 第一時段
                        // time[1] 第二段
                        // time[2] 第三段
                        let time1Min = value.weatherElement[2].time[0].parameter.parameterName;
                        let time2Min = value.weatherElement[2].time[1].parameter.parameterName;
                        let time3Min = value.weatherElement[2].time[2].parameter.parameterName;
                        let time1Max = value.weatherElement[4].time[0].parameter.parameterName;
                        let time2Max = value.weatherElement[4].time[1].parameter.parameterName;
                        let time3Max = value.weatherElement[4].time[2].parameter.parameterName;

                        let time1Wx = value.weatherElement[0].time[0].parameter.parameterName;
                        let time2Wx = value.weatherElement[0].time[1].parameter.parameterName;
                        let time3Wx = value.weatherElement[0].time[2].parameter.parameterName;

                        let time1WxValue = value.weatherElement[0].time[0].parameter.parameterValue;
                        let time2WxValue = value.weatherElement[0].time[1].parameter.parameterValue;
                        let time3WxValue = value.weatherElement[0].time[2].parameter.parameterValue;

                        let time1Start = value.weatherElement[0].time[0].startTime;
                        let time2Start = value.weatherElement[0].time[1].startTime;
                        let time3Start = value.weatherElement[0].time[2].startTime;

                        let time1End = value.weatherElement[0].time[0].endTime;
                        let time2End = value.weatherElement[0].time[1].endTime;
                        let time3End = value.weatherElement[0].time[2].endTime;

                        console.log('time1Min', time1Min);
                        console.log('time2Min', time2Min);
                        console.log('time3Min', time3Min);




                        // append table
                        // day 白天
                        // night 晚上

                        // 如果time strar > 18 night
                        let time1Folder = 'day';
                        let time2Folder = 'day';
                        let time3Folder = 'day';
                        if (time1StartHour > 18) {
                            time1Folder = 'night';
                        }
                        if (time2StartHour >= 18) {
                            time2Folder = 'night';
                        }

                        if (time3StartHour > 18) {
                            time3Folder = 'night';
                        }





                        tmpText += `
                         <tr>
                            <td>${key + 1}</td>
                            <td>${value.locationName}</td>
                            <td>${time1Min}-${time1Max} °C  ${time1Wx} <img src="./data/${time1Folder}/${time1WxValue}.svg" alt=""></td>
                            <td>${time2Min}-${time2Max} °C  ${time2Wx} <img src="./data/${time2Folder}/${time2WxValue}.svg" alt=""></td>
                            <td>${time3Min}-${time3Max} °C  ${time3Wx} <img src="./data/${time3Folder}/${time3WxValue}.svg" alt=""></td>
                         </tr>
                        `;

                    });
                    myTbody.append(tmpText);


                }
            });

        });

    </script>
</body>

</html>
