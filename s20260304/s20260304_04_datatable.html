<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <!-- <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.9.4/css/jquery.dataTables_themeroller.min.css"
        integrity="sha512-tsFLwMpX32oohZeRw2LLA8sS4t5d3EMZoJtyWtoEqcNOQUEXH99LsfFafGheUcnGzX2HK2Og1wUQTRYC32vc0Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
</head>

<body>

    <table id="myTable" class="display">
        <thead>
            <tr>
                <th>ID</th>
                <th>NAME</th>
                <th>PHONE</th>
                <th>ADDRESS</th>
            </tr>
        </thead>
        <tbody id="myTbody">
            <!-- <tr>
                <td>2</td>
                <td>吳福洋襪子故事館</td>
                <td>新北市林口區工二工業區工九路3號</td>
                <td>26035008</td>
            </tr> -->

        </tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.9.4/jquery.dataTables.min.js"
        integrity="sha512-Ge5xFEwkX4MPrY+dU9f2bZVA4Qxht1OcSlCt2oTH5QK0dLGxCZVVuXpsTj2mX+val8Pj4lMK2JQUVgMtEY6cqg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script> -->



    <script>
        $(document).ready(function () {

            // $('#myTable').DataTable();

            // 1.bind
            const myTable = $('#myTable');
            const myTbody = $('#myTbody');

            // 2.action

            let url = "./data/data.json";
            $.ajax({
                type: "get",
                url: url,
                data: "data",
                dataType: "json",
                success: function (res) {
                    console.log('res', res);
                    let data = res;
                    let tmpText = ``;
                    $.each(data, function (key, value) {
                        console.log('key', key);
                        console.log('value', value);

                        tmpText += `
                          <tr>
                            <td>${value.id}</td>
                            <td>${value.name}</td>
                            <td>${value.phone}</td>
                            <td>${value.address}</td>
                          </tr>
                        `;
                    });

                    // append
                    myTbody.append(tmpText);
                    // 重新 載入datatable
                    // myTable.DataTable();

                    // DataTable 適合用在資料筆數很少
                    // 分頁 搜尋 排序 
                    // 如果資料很大 還是建議使用後端自己做


                    myTable.DataTable({
                        language: {
                            "lengthMenu": "顯示 _MENU_ 筆資料",
                            "sProcessing": "處理中...",
                            "sZeroRecords": "没有匹配结果",
                            "sInfo": "目前有 _MAX_ 筆資料",
                            "sInfoEmpty": "目前共有 0 筆紀錄",
                            "sInfoFiltered": " ",
                            "sInfoPostFix": "",
                            "sSearch": "搜尋:",
                            "sUrl": "",
                            "sEmptyTable": "尚未有資料紀錄存在",
                            "sLoadingRecords": "載入資料中...",
                            "sInfoThousands": ",",
                            "oPaginate": {
                                "sFirst": "首頁",
                                "sPrevious": "上一頁",
                                "sNext": "下一頁",
                                "sLast": "末頁"
                            },
                            "order": [
                                [0, "desc"]
                            ],
                            "oAria": {
                                "sSortAscending": ": 以升序排列此列",
                                "sSortDescending": ": 以降序排列此列"
                            }
                        },

                    });



                }


            });

        });

    </script>
</body>

</html>
