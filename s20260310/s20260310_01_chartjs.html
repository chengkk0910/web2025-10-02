<!DOCTYPE html>
<html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js"></script>

<body>

    <canvas id="myChart" style="width:100%;max-width:600px"></canvas>
    <canvas id="myChart2" style="width:100%;max-width:600px"></canvas>

    <script>
        // myChart 產率報表
        var xValues = ["第一季", "第二季", "第三季", "第四季"];
        let yValues = [55, 49, 44, 24];
        let barColors = ["lightpink", "lightblue", "lightgreen", "lightyellow"];

        new Chart("myChart", {
            type: "bar",
            data: {
                labels: xValues,
                datasets: [{
                    backgroundColor: barColors,
                    data: yValues
                }]
            },
            options: {
                legend: { display: false },
                title: {
                    display: true,
                    text: "2026 產率報表"
                }
            }
        });

        // myChart 產率報表 end

        // myChart2 折線圖
        let xValues2 = ["第一季", "第二季", "第三季", "第四季"];
        let yValues2 = [55, 49, 44, 24, 15];
        let barColors2 = ["lightpink", "lightblue", "lightgreen", "lightyellow"];

        new Chart("myChart2", {
            type: "bar",
            data: {
                labels: xValues2,
                datasets: [{
                    backgroundColor: barColors2,
                    data: yValues2
                }]
            },
            options: {
                legend: { display: false },
                title: {
                    display: true,
                    text: "2026 產率報表"
                }
            }
        });
        // myChart2  end
    </script>

</body>

</html>
